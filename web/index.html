<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>MetaBoost</title>

    <style id="expo-reset">
      /* Verrouillage total du viewport — aucun scroll élastique, aucun rubber-banding */
      html, body, #root {
        height: 100dvh !important;
        width: 100vw !important;
        overflow: hidden !important;
        overscroll-behavior: none !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        background-color: #010613 !important;
      }

      html {
        padding-top: env(safe-area-inset-top) !important;
      }

      #root {
        display: flex !important;
        flex-direction: column !important;
        padding-top: env(safe-area-inset-top) !important;
        padding-bottom: env(safe-area-inset-bottom) !important;
        box-sizing: border-box !important;
        right: 0 !important;
      }

      /* Force la propagation de hauteur dans tous les wrappers React Native Web */
      #root > div,
      #root > div > div,
      #root > div > div > div {
        height: 100% !important;
        overflow: hidden !important;
        background-color: #060E1C;
      }

      /* Couche de fond de secours — couvre tout espace hors #root */
      .bg-fixed-layer {
        position: fixed !important;
        top: -200px;
        left: -200px;
        right: -200px;
        bottom: -200px;
        background-color: #010613;
        z-index: -1;
        pointer-events: none;
      }

      .button-container {
        position: fixed;
        bottom: calc(20px + var(--kb-offset, 0px) + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        z-index: 50;
      }

      input, select, textarea {
        font-size: 16px;
      }
    </style>

    <script>
      var updateLayout = function () {
        var vv = window.visualViewport;
        if (!vv) return;

        var kbOffset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
        document.documentElement.style.setProperty('--kb-offset', kbOffset + 'px');

        // Fallback JS pour iOS < 15.4 (pas de support dvh natif)
        try {
          if (!CSS.supports('height', '1dvh')) {
            var root = document.getElementById('root');
            if (root) root.style.setProperty('height', vv.height + 'px', 'important');
          }
        } catch (e) {
          var root = document.getElementById('root');
          if (root) root.style.setProperty('height', vv.height + 'px', 'important');
        }
      };

      // Verrouille le scroll et force la mise à jour du layout
      document.addEventListener('scroll', function (e) {
        e.preventDefault();
        window.scrollTo(0, 0);
        updateLayout();
      }, { passive: false });

      document.addEventListener('touchmove', function (e) {
        if (e.touches.length === 1) e.preventDefault();
      }, { passive: false });

      // Délai de 100ms après fermeture du clavier pour recalculer correctement
      document.addEventListener('focusout', function () {
        setTimeout(function () {
          window.scrollTo(0, 0);
          updateLayout();
        }, 100);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateLayout);
        window.visualViewport.addEventListener('scroll', updateLayout);
      }
      window.addEventListener('resize', updateLayout);
      updateLayout();
    </script>
  </head>

  <body>
    <div class="bg-fixed-layer"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
