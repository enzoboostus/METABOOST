<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, interactive-widget=resizes-content"
    />

    <title>MetaBoost</title>

    <style id="expo-reset">
      html,
      body {
        height: 100%;
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      body {
        overflow: hidden;
        position: fixed;
        width: 100%;
      }
      /* Fix 3 — root verrouillé à l'écran exact, aucun pixel de débordement */
      #root {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        flex: 1;
      }
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>

    <!-- Fix 2 — Remise à zéro du scroll au blur de tout input -->
    <script>
      document.addEventListener('focusout', function () {
        window.scrollTo(0, 0);
        if (document.documentElement) {
          document.documentElement.scrollTop = 0;
        }
        if (document.body) {
          document.body.scrollTop = 0;
        }
      });
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
