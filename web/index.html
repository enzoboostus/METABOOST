<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!--
      Viewport — CONSTANTE IMMUABLE.
      Ne pas modifier : maximum-scale=1 + user-scalable=0 = anti-zoom iOS.
      interactive-widget=resizes-content = pas de saut horizontal clavier.
      viewport-fit=cover = fond noir derrière encoche et barre home.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, interactive-widget=resizes-content, viewport-fit=cover"
    />

    <!-- StatusBar iOS immersive noir -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>MetaBoost</title>

    <style id="expo-reset">
      /* Peindre le néant : si Safari soulève l'app, il affiche du noir */
      html { background-color: #000000 !important; }
      body { background-color: #000000 !important; }
      #root { background-color: #000000 !important; }

      html,
      body {
        overscroll-behavior-y: none !important;
        position: fixed;
        width: 100%;
        height: -webkit-fill-available;
        height: 100%;
        overflow-x: hidden;
      }
      body {
        overflow: hidden;
        -webkit-overflow-scrolling: auto;
      }
      #root {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        height: -webkit-fill-available;
        overflow: hidden;
        flex: 1;
      }
      /* Fix anti-zoom iOS — CONSTANTE IMMUABLE, ne pas toucher */
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>

    <!-- Remise à zéro du scroll au blur — ne pas toucher -->
    <script>
      document.addEventListener('focusout', function () {
        window.scrollTo(0, 0);
        if (document.documentElement) document.documentElement.scrollTop = 0;
        if (document.body) document.body.scrollTop = 0;
      });
    </script>

    <!-- Verrouillage total overscroll vertical iOS (rubber-band) -->
    <script>
      document.body.addEventListener(
        'touchmove',
        function (e) {
          if (e.target.tagName !== 'INPUT') e.preventDefault();
        },
        { passive: false }
      );
    </script>

    <!-- Empêche Safari de scroller vers l'input au focus -->
    <script>
      window.addEventListener(
        'focusin',
        function (e) {
          e.preventDefault();
          window.scrollTo(0, 0);
        },
        { passive: false }
      );
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
