<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />
    <title>MetaBoost</title>
    <style id="expo-reset">
      html {
        /* Fix 2 — fond sombre sur html : couvre toute fuite de background */
        background-color: #060E1C;
        /* Fix 1 — svh = Small Viewport Height : stable même clavier ouvert */
        height: 100%;
        height: 100svh;
      }
      body {
        background-color: #060E1C;
        overflow: hidden;
        /* Fix 1 — min-height svh sur le wrapper global */
        min-height: 100%;
        min-height: 100svh;
        height: 100%;
        height: 100svh;
        /* Fix 3 — safe-area top pour éviter le chevauchement avec la barre iOS */
        padding-top: env(safe-area-inset-top);
        box-sizing: border-box;
      }
      #root {
        display: flex;
        /* Fix 1 — flex-grow remplace height fixe, le bouton CTA reste dans le flux */
        flex: 1;
        min-height: 100%;
        min-height: 100svh;
        flex-direction: column;
      }
      /* Anti-zoom Safari — ne pas toucher */
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
