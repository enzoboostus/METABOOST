<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, interactive-widget=resizes-content"
    />
    <title>MetaBoost</title>

    <style id="expo-reset">
      html, body {
        background-color: #060E1C;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        margin: 0;
        padding: 0;
      }
      html {
        padding-top: env(safe-area-inset-top);
      }
      #root {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #060E1C;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
      }
      .bg-fixed-layer {
        position: fixed;
        top: -100px;
        left: -100px;
        right: -100px;
        bottom: -100px;
        background-color: #060E1C;
        z-index: -1;
        pointer-events: none;
      }
      .button-container {
        position: fixed;
        bottom: calc(20px + var(--kb-offset, 0px) + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        z-index: 50;
      }
      input, select, textarea {
        font-size: 16px;
      }
    </style>

    <script>
      var updateLayout = function () {
        var vv = window.visualViewport;
        var vvHeight = vv ? vv.height : window.innerHeight;
        var vvOffsetTop = vv ? vv.offsetTop : 0;
        var kbOffset = Math.max(0, window.innerHeight - vvHeight - vvOffsetTop);
        document.documentElement.style.setProperty('--kb-offset', kbOffset + 'px');
        // Shrink #root to match visible area — eliminates empty space below content
        var root = document.getElementById('root');
        if (root) root.style.bottom = kbOffset + 'px';
      };

      document.addEventListener('scroll', function () {
        window.scrollTo(0, 0);
        updateLayout();
      }, { passive: false });

      document.addEventListener('focusout', function () {
        window.scrollTo(0, 0);
        updateLayout();
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateLayout);
        window.visualViewport.addEventListener('scroll', updateLayout);
      }
      window.addEventListener('resize', updateLayout);
      updateLayout();
    </script>
  </head>

  <body>
    <div class="bg-fixed-layer"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
