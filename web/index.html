<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!--
      Fix viewport: maximum-scale=1 + user-scalable=0 bloquent le zoom natif Safari
      lors du focus sur un champ de saisie.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />

    <title>MetaBoost</title>

    <style id="expo-reset">
      html,
      body {
        height: 100%;
        /* Fix 3 — neutralise tout résidu de scroll horizontal */
        overflow-x: hidden;
        /* Empêche le rubber-band scroll d'iOS qui décale la page */
        overscroll-behavior: none;
      }
      body {
        overflow: hidden;
        /*
          Fix clé iOS Safari : position:fixed empêche le navigateur de
          redimensionner le viewport quand le clavier virtuel apparaît.
          React Native Web gère son propre scroll via ScrollView.
        */
        position: fixed;
        width: 100%;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /*
        Fix 2 — Empêche Safari de zoomer sur le focus d'un input.
        Sans !important : les styles inline de React Native (fontSize:40, etc.)
        l'emportent correctement sur cette règle de base.
        Cette règle ne couvre que les inputs sans fontSize explicite.
      */
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
