<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />
    <title>MetaBoost</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
        /* Fond du navigateur = même couleur que l'app.
           Quand Safari soulève le layout au focus, on voit du sombre, pas du blanc. */
        background-color: #060E1C;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* Empêche Safari de zoomer sur le focus d'un input */
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
