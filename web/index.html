<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Viewport — NE PAS MODIFIER : contient les fixes anti-zoom iOS -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, interactive-widget=resizes-content"
    />

    <!-- StatusBar iOS immersive noir -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>MetaBoost</title>

    <style id="expo-reset">
      html,
      body {
        height: 100%;
        overflow-x: hidden;
        overscroll-behavior: none;
        /* Fond noir derrière tout overscroll / safe-area */
        background-color: #000000 !important;
      }
      body {
        overflow: hidden;
        position: fixed;
        width: 100%;
      }
      #root {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        flex: 1;
        background-color: #000000;
      }
      /* Fix anti-zoom iOS — ne pas toucher */
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>

    <!-- Remise à zéro du scroll au blur — ne pas toucher -->
    <script>
      document.addEventListener('focusout', function () {
        window.scrollTo(0, 0);
        if (document.documentElement) {
          document.documentElement.scrollTop = 0;
        }
        if (document.body) {
          document.body.scrollTop = 0;
        }
      });
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
