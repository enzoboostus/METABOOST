<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />
    <title>MetaBoost</title>
    <style id="expo-reset">
      html {
        /* Fix 4 — background-attachment:fixed force la couleur à rester ancrée
           même lors d'un scroll ou d'un décalage Safari, aucun blanc ne filtre */
        background-color: #060E1C;
        background-attachment: fixed;
        /* Fix 1 — double déclaration : iOS 15 prend 100vh, iOS 16+ prend 100svh */
        height: 100vh;
        height: 100svh;
      }

      body {
        background-color: #060E1C;
        background-attachment: fixed;
        /* Fix 2 — tue l'effet élastique (bounce) qui expose le fond blanc */
        overscroll-behavior: none;
        overflow: hidden;
        /* Fix 1 — fallback vh puis svh */
        min-height: 100vh;
        min-height: 100svh;
        height: 100vh;
        height: 100svh;
        /* Safe-area top */
        padding-top: env(safe-area-inset-top);
        box-sizing: border-box;
      }

      /* Fix 1 — .main-wrapper pattern appliqué sur #root */
      #root {
        display: flex;
        flex-direction: column;
        flex: 1;
        /* Fix 1 — double déclaration vh / svh */
        min-height: 100vh;
        min-height: 100svh;
        /* Fix 3 — safe-area bottom : le bouton CTA respecte l'indicateur home */
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
      }

      /* Anti-zoom Safari — ne pas toucher */
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
