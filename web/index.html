<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, interactive-widget=resizes-content"
    />
    <title>MetaBoost</title>

    <style id="expo-reset">
      html {
        background-color: #060E1C;
        height: 100vh;
        height: 100svh;
      }
      body {
        background-color: #060E1C;
        overscroll-behavior: none;
        overflow: hidden;
        min-height: 100vh;
        min-height: 100svh;
        height: 100vh;
        height: 100svh;
        padding-top: env(safe-area-inset-top);
        box-sizing: border-box;
      }
      #root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: var(--app-height, 100svh);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
      }
      .bg-fixed-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #060E1C;
        z-index: -1;
        pointer-events: none;
      }
      .button-container {
        position: fixed;
        bottom: calc(20px + var(--kb-offset, 0px) + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        z-index: 50;
      }
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>

    <script>
      var updateLayout = function () {
        var vvHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        var kbOffset = window.innerHeight - vvHeight;
        document.documentElement.style.setProperty('--app-height', vvHeight + 'px');
        document.documentElement.style.setProperty('--kb-offset', kbOffset + 'px');
      };
      window.addEventListener('resize', updateLayout);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateLayout);
      }
      updateLayout();

      // Force scroll reset on input blur
      document.addEventListener('focusout', function () {
        window.scrollTo(0, 0);
      });
    </script>
  </head>

  <body>
    <div class="bg-fixed-layer"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
