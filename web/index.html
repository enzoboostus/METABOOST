<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, interactive-widget=resizes-content"
    />
    <title>MetaBoost</title>

    <style id="expo-reset">
      html, body {
        background-color: #060E1C;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        margin: 0;
        padding: 0;
      }
      html {
        padding-top: env(safe-area-inset-top);
      }
      #root {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        /* 100dvh = dynamic viewport height: se réduit automatiquement quand le clavier s'ouvre */
        height: 100dvh;
        background-color: #060E1C;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        box-sizing: border-box;
      }
      /* Force dark background sur tous les wrappers React Native */
      #root > div {
        background-color: #060E1C;
      }
      .bg-fixed-layer {
        position: fixed;
        top: -100px;
        left: -100px;
        right: -100px;
        bottom: -100px;
        background-color: #060E1C;
        z-index: -1;
        pointer-events: none;
      }
      .button-container {
        position: fixed;
        bottom: calc(20px + var(--kb-offset, 0px) + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        z-index: 50;
      }
      input, select, textarea {
        font-size: 16px;
      }
    </style>

    <script>
      var updateLayout = function () {
        var vv = window.visualViewport;
        if (!vv) return;

        var kbOffset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
        document.documentElement.style.setProperty('--kb-offset', kbOffset + 'px');

        // Fallback pour iOS < 15.4 qui ne supporte pas dvh
        try {
          if (!CSS.supports('height', '1dvh')) {
            var root = document.getElementById('root');
            if (root) root.style.height = vv.height + 'px';
          }
        } catch (e) {
          var root = document.getElementById('root');
          if (root) root.style.height = vv.height + 'px';
        }
      };

      // Bloque tout scroll parasite iOS
      document.addEventListener('scroll', function (e) {
        window.scrollTo(0, 0);
        updateLayout();
      }, { passive: false });

      // Délai pour laisser le clavier se fermer complètement avant de recalculer
      document.addEventListener('focusout', function () {
        setTimeout(function () {
          window.scrollTo(0, 0);
          updateLayout();
        }, 100);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateLayout);
        window.visualViewport.addEventListener('scroll', updateLayout);
      }
      window.addEventListener('resize', updateLayout);
      updateLayout();
    </script>
  </head>

  <body>
    <div class="bg-fixed-layer"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
